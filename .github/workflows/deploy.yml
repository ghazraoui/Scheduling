name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        continue-on-error: true
        run: |
          curl -sf --max-time 30 --retry 1 --retry-delay 5 -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            https://cc.swisslanguagegroup.cloud/webhook/deploy/scheduling || true
